<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR 热气球托盘场景 - Ak48压缩版</title>
    <style>
        :root { --bg: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); overflow: hidden;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100vh; width: 100vw;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        
        #vr-entry { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20; }
        #btn-container { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .vr-btn {
            display: block; padding: 16px 44px; font-size: 20px; font-weight: 700;
            letter-spacing: 2px; color: #fff;
            background: linear-gradient(135deg, #e94560, #c23152);
            border: none; border-radius: 50px; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 8px 30px rgba(233,69,96,0.5);
            text-transform: uppercase; outline: none; min-width: 280px;
        }
        .vr-btn:hover { background: linear-gradient(135deg, #ff5a7a, #e94560); transform: translateY(-3px); }
        .vr-btn:active { transform: scale(0.96); }
        .vr-btn:disabled { background: #555; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        .vr-btn-alt {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            box-shadow: 0 8px 30px rgba(33,150,243,0.5);
        }
        .vr-btn-alt:hover { background: linear-gradient(135deg, #42a5f5, #2196F3); }
        
        #vr-hints {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
        }
        .hint-badge {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 8px 18px; color: #fff; font-size: 13px;
            letter-spacing: 1px; white-space: nowrap;
        }
        .hint-badge .key { font-weight: 700; color: #ffd700; }
        
        #status-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 30; color: #fff; font-size: 18px; text-align: center;
            background: rgba(0,0,0,0.75); padding: 20px 30px;
            border-radius: 16px; display: none;
        }
        #status-msg.error { background: rgba(180,30,30,0.85); display: block; }
        
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: #fff; font-size: 20px; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        #loading-spinner {
            width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #time-switch {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 25; display: flex; gap: 10px;
        }
        .time-btn {
            padding: 10px 24px; font-size: 15px; font-weight: 700;
            letter-spacing: 1px; color: #fff; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 30px; cursor: pointer; outline: none;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        .time-btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
        .time-btn.active { background: rgba(255,255,255,0.3); border-color: #ffd700; box-shadow: 0 0 16px rgba(255,215,0,0.5); }
        .time-btn:nth-child(1) { border-left: 3px solid #ffaa00; } /* 黄昏 */
        .time-btn:nth-child(2) { border-left: 3px solid #4da6ff; } /* 白天 */
        .time-btn:nth-child(3) { border-left: 3px solid #8899ff; } /* 夜晚 */

        #sky-hint {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 24; pointer-events: none;
            color: rgba(255,255,255,0.6); font-size: 12px; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div id="loading-spinner"></div>
        <div>加载中...</div>
    </div>
    <div id="vr-entry">
        <div id="btn-container">
            <button id="enter-vr-btn" class="vr-btn">🎈 正常开始游戏</button>
            <button id="enter-vr-left-hand" class="vr-btn vr-btn-alt">🔫 左手持枪模式</button>
        </div>
    </div>
    <div id="vr-hints" style="display:none"></div>
    <div id="status-msg"></div>
    <div id="time-switch">
        <button id="btn-dusk" class="time-btn">🌅 黄昏</button>
        <button id="btn-day" class="time-btn active">☀️ 白天</button>
        <button id="btn-night" class="time-btn">🌙 夜晚</button>
    </div>
    <div id="sky-hint">VR中按左手 X/Y 键切换天空 · 30秒渐变过渡</div>

    <!-- 本地文件，HTTP 服务器即可，PICO 浏览器无需访问任何外部网络 -->
    <script type="importmap">
        {
            "imports": {
                "three": "./three.module.js",
                "three/addons/": "./jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // DOM 元素
        const enterVRBtn = document.getElementById('enter-vr-btn');
        const enterVRLeftHandBtn = document.getElementById('enter-vr-left-hand');
        const statusMsgEl = document.getElementById('status-msg');
        const vrHintsEl = document.getElementById('vr-hints');
        const vrEntryEl = document.getElementById('vr-entry');
        const loadingEl = document.getElementById('loading');

        // -------------------- 加载状态管理 --------------------
        const loadingResources = { texture: false, model: false };
        let loadingHidden = false;

        function checkAllLoaded(msg) {
            if (loadingHidden) return;
            if (msg) {
                loadingEl.innerHTML = '<div style="color:#ffaa00;">' + msg + '</div>';
                setTimeout(() => { loadingEl.style.display = 'none'; loadingHidden = true; }, 1500);
                return;
            }
            if (loadingResources.texture && loadingResources.model) {
                loadingHidden = true;
                loadingEl.style.display = 'none';
            }
        }

        function onResourceError(msg) {
            loadingEl.innerHTML = '<div style="color:#ffaa00;">' + msg + '</div>';
            setTimeout(() => { loadingEl.style.display = 'none'; loadingHidden = true; }, 2000);
        }

        // 最长等待 15 秒后强制关闭
        setTimeout(() => {
            if (!loadingHidden) onResourceError('⚠️ 加载超时，检查 HTTP 服务器是否运行中...');
        }, 15000);

        // 摇杆和输入状态
        const rightInput = { stickX: 0, stickY: 0 };
        const leftInput = { stickX: 0, stickY: 0 };

        

        const MOVE_SPEED = 3.5;
        const DEADZONE = 0.2;
        const SHOOT_COOLDOWN = 150; // 射击冷却时间(ms)

        // ==================== 音效系统（Web Audio API） ====================
        let audioCtx = null;
        let bgMusicNode = null;
        let bgMusicGain = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBackgroundMusic();
        }

        // 射击音效 - 更真实的枪声
        function playShootSound() {
            if (!audioCtx) return;
            // 使用噪声模拟枪声
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1));
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(3000, audioCtx.currentTime);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.1);
        }

        // 气球爆裂音效 - 更真实的爆裂声
        function playBalloonPopSound() {
            if (!audioCtx) return;
            // 低频爆裂
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc1.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
            gain1.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start();
            osc1.stop(audioCtx.currentTime + 0.2);
            
            // 高频撕裂声
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(2000, audioCtx.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
            gain2.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.15);
        }

        // 背景音乐 - 简单的循环旋律
        function startBackgroundMusic() {
            if (!audioCtx || bgMusicNode) return;
            
            bgMusicGain = audioCtx.createGain();
            bgMusicGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            bgMusicGain.connect(audioCtx.destination);
            
            // 简单的和弦进行
            const chords = [
                [261.63, 329.63, 392.00], // C major
                [293.66, 369.99, 440.00], // D minor
                [349.23, 440.00, 523.25], // F major
                [392.00, 493.88, 587.33]  // G major
            ];
            
            let chordIndex = 0;
            
            function playChord() {
                if (!bgMusicGain) return;
                
                const chord = chords[chordIndex % chords.length];
                chord.forEach(freq => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
                    osc.connect(gain);
                    gain.connect(bgMusicGain);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 2);
                });
                
                chordIndex++;
                if (bgMusicNode) {
                    bgMusicNode = setTimeout(playChord, 2000);
                }
            }
            
            bgMusicNode = setTimeout(playChord, 500);
        }

        function stopBackgroundMusic() {
            if (bgMusicNode) {
                clearTimeout(bgMusicNode);
                bgMusicNode = null;
            }
            if (bgMusicGain) {
                bgMusicGain.gain.setValueAtTime(0, audioCtx.currentTime);
                bgMusicGain = null;
            }
        }

        // Three.js 核心
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // VR头显自带反锯齿，关闭省GPU
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.0)); // 限制1.0，移动端降采样
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        // VR 模式下关闭阴影（移动 GPU 瓶颈优化）
        function setShadow(enabled) {
            renderer.shadowMap.enabled = enabled;
            sunLight.castShadow = enabled;
            if (!enabled) {
                // VR 时直接关闭所有阴影投射，避免额外的深度图 pass
                scene.traverse(obj => {
                    if (obj.isMesh) obj.castShadow = false;
                });
            } else {
                // 恢复
                sunLight.castShadow = true;
                scene.traverse(obj => {
                    if (obj.isMesh && (obj === ak48Model || obj.parent === ak48Model)) {
                        // 不处理
                    }
                });
            }
        }
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.NoToneMapping; // 关闭色调映射，ACES最影响移动GPU
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 100);
        renderer.setClearColor(new THREE.Color(0x87CEEB));

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 6.6, 0); // <-- 玩家眼高(米)，改这里调整身高
        const dolly = new THREE.Group();
        dolly.add(camera);
        scene.add(dolly);

        // ==================== 日夜黄昏天空系统 ====================
        // 天空穹顶（可动态变色）
        const skyDomeGeo = new THREE.SphereGeometry(60, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        const skyDomeMat = new THREE.MeshBasicMaterial({
            color: 0x87CEEB, side: THREE.BackSide, depthWrite: false
        });
        const skyDome = new THREE.Mesh(skyDomeGeo, skyDomeMat);
        skyDome.position.y = 1.6;
        dolly.add(skyDome);

        // 星空粒子（夜晚可见，三层叠加制造闪烁感）
        // 圆形光点纹理（消除方片）
        function createGlowTexture(innerColor, outerColor, size) {
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
            g.addColorStop(0, innerColor);
            g.addColorStop(0.15, innerColor);
            g.addColorStop(0.5, outerColor);
            g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, size, size);
            return new THREE.CanvasTexture(canvas);
        }
        const starTex = createGlowTexture('white', 'rgba(180,200,255,0.6)', 64);
        const starLayers = [];
        for (let layer = 0; layer < 3; layer++) {
            const starGeo = new THREE.BufferGeometry();
            const count = 80 + layer * 50; // 80 + 130 + 180 = 390 颗
            const positions = new Float32Array(count * 3);
            const twinkleData = new Float32Array(count * 2);
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                // 幂函数分布：头顶最密，地平线附近稀疏（模拟真实星空）
                const phi = Math.pow(Math.random(), 2.5) * Math.PI * 0.48;
                const r = 48 + Math.random() * 4 + layer * 1.5;
                positions[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
                positions[i * 3 + 1] = Math.cos(phi) * r + 1.6;
                positions[i * 3 + 2] = Math.sin(phi) * Math.sin(theta) * r;
                twinkleData[i * 2] = Math.random() * Math.PI * 2;
                twinkleData[i * 2 + 1] = 0.3 + Math.random() * 1.5;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starMat = new THREE.PointsMaterial({
                map: starTex,
                color: 0xffffff,
                size: 0.35 + layer * 0.1,
                transparent: true,
                opacity: 0,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const starField = new THREE.Points(starGeo, starMat);
            starField.userData = { twinkle: twinkleData, baseOpacity: 0 };
            dolly.add(starField);
            starLayers.push(starField);
        }

        // ── 太阳/月亮精灵（优先加载 sun.png / moon.png，失败则 Canvas 自动生成）──
        // 图片要求：PNG 格式、透明背景、建议 512×512，放到 index.html 同级目录
        function loadSpriteImage(path, spriteMat) {
            const img = new Image();
            img.onload = () => {
                const tex = new THREE.CanvasTexture(img);
                tex.colorSpace = THREE.SRGBColorSpace;
                spriteMat.map?.dispose();
                spriteMat.map = tex;
                spriteMat.needsUpdate = true;
                console.log('✅ 已加载:', path);
            };
            img.src = path; // 404 静默忽略
        }

        // ── 太阳 Canvas 纹理 ──
        const sunCanvas = document.createElement('canvas');
        sunCanvas.width = 512; sunCanvas.height = 512;
        (() => {
            const c = sunCanvas.getContext('2d'), cx = 256, cy = 256;
            const g = c.createRadialGradient(cx, cy, 30, cx, cy, 250);
            g.addColorStop(0, 'rgba(255,255,220,1)');
            g.addColorStop(0.08, 'rgba(255,255,200,1)');
            g.addColorStop(0.25, 'rgba(255,200,80,0.8)');
            g.addColorStop(0.5, 'rgba(255,140,30,0.25)');
            g.addColorStop(1, 'rgba(255,80,10,0)');
            c.fillStyle = g; c.fillRect(0, 0, 512, 512);
        })();
        const sunTex = new THREE.CanvasTexture(sunCanvas);
        sunTex.colorSpace = THREE.SRGBColorSpace;
        const sunSpriteMat = new THREE.SpriteMaterial({
            map: sunTex, color: 0xffffff,
            transparent: true, depthWrite: false, blending: THREE.NormalBlending, opacity: 1
        });
        const sunSprite = new THREE.Sprite(sunSpriteMat);
        sunSprite.scale.set(8, 8, 1);
        dolly.add(sunSprite);

        // ── 月牙 Canvas 纹理（纯路径，无 composite 黑边）──
        const moonCanvas = document.createElement('canvas');
        moonCanvas.width = 512; moonCanvas.height = 512;
        (() => {
            const c = moonCanvas.getContext('2d'), cx = 256, cy = 256, R = 200;
            // 柔光
            const g = c.createRadialGradient(cx, cy, R * 0.12, cx, cy, R * 0.7);
            g.addColorStop(0, 'rgba(200,220,255,0.5)');
            g.addColorStop(0.5, 'rgba(140,170,220,0.1)');
            g.addColorStop(1, 'rgba(255,255,255,0)');
            c.fillStyle = g; c.fillRect(0, 0, 512, 512);
            // 月牙：外弧 + 反向内弧
            const cutX = cx + R * 0.35, cutY = cy - R * 0.08, cutR = R * 0.82;
            const a1 = -Math.PI * 0.42, a2 = Math.PI * 0.42;
            c.fillStyle = 'rgba(232,240,255,0.92)';
            c.beginPath();
            c.arc(cx, cy, R, a1, a2);
            c.arc(cutX, cutY, cutR, a2, a1, true);
            c.closePath();
            c.fill();
        })();
        const moonTex = new THREE.CanvasTexture(moonCanvas);
        moonTex.colorSpace = THREE.SRGBColorSpace;
        const moonSpriteMat = new THREE.SpriteMaterial({
            map: moonTex, color: 0xffffff,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, opacity: 0
        });
        const moonSprite = new THREE.Sprite(moonSpriteMat);
        moonSprite.scale.set(5, 5, 1);
        dolly.add(moonSprite);

        // 加载 image 目录中的太阳/月亮/气球贴图
        loadSpriteImage('image/sun.png', sunSpriteMat);
        loadSpriteImage('image/moon.png', moonSpriteMat);

        // 气球笑脸贴图
        const balloonTex = new THREE.Texture();
        const balloonImg = new Image();
        balloonImg.onload = () => {
            balloonTex.image = balloonImg;
            balloonTex.colorSpace = THREE.SRGBColorSpace;
            balloonTex.needsUpdate = true;
            console.log('✅ 气球贴图加载成功: image/smile.png');
        };
        balloonImg.src = 'image/smile.png';

        // 太阳光（方向光）
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
        sunLight.position.set(20, 40, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 100;
        sunLight.shadow.camera.left = -30;
        sunLight.shadow.camera.right = 30;
        sunLight.shadow.camera.top = 30;
        sunLight.shadow.camera.bottom = -30;
        scene.add(sunLight);

        // 环境光 & 半球光（保存引用以便动态更新）
        const ambientLight = new THREE.AmbientLight(0xffeedd, 1.2);
        scene.add(ambientLight);
        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x90EE90, 0.8);
        scene.add(hemiLight);

        // ── 天空预设：白天 / 黄昏 / 夜晚 ──
        const DAY_SUN_AZ = Math.atan2(20, 10); // 正午太阳方位 ≈ 1.107 rad
        const skyPresets = {
            day: {
                bg: 0x87CEEB, fog: 0x87CEEB, fogNear: 30, fogFar: 100,
                skyDome: 0x87CEEB, ambient: 0xffeedd, ambientI: 1.2,
                sun: 0xfffef5, sunI: 2.5, sunX: 20, sunY: 40, sunZ: 10,
                hemiSky: 0x87CEEB, hemiGround: 0x90EE90, hemiI: 0.8,
                stars: 0,
                sunElev: 50, moonElev: -30, moonAz: DAY_SUN_AZ
            },
            dusk: {
                bg: 0xe85d26, fog: 0xe87544, fogNear: 20, fogFar: 80,
                skyDome: 0xe86830, ambient: 0xffccaa, ambientI: 0.7,
                sun: 0xff9955, sunI: 1.8, sunX: 30, sunY: 8, sunZ: 5,
                hemiSky: 0xff5511, hemiGround: 0x553322, hemiI: 0.5,
                stars: 0.25,
                sunElev: 5, moonElev: 5, moonAz: Math.atan2(30, 5) + Math.PI
            },
            night: {
                bg: 0x0a0a28, fog: 0x0c0c2a, fogNear: 15, fogFar: 60,
                skyDome: 0x0e0e30, ambient: 0x1a2a55, ambientI: 0.35,
                sun: 0x8899cc, sunI: 0.5, sunX: -10, sunY: 45, sunZ: -15,
                hemiSky: 0x0a0a3a, hemiGround: 0x0f0f1a, hemiI: 0.2,
                stars: 1.0,
                sunElev: -25, moonElev: 50, moonAz: DAY_SUN_AZ  // 月亮在正午太阳位
            }
        };

        // 当前天空状态（会被 lerp 到目标预设）
        const skyNow = {
            bg: new THREE.Color(skyPresets.day.bg),
            fog: new THREE.Color(skyPresets.day.fog),
            fogNear: 30, fogFar: 100,
            skyDome: new THREE.Color(skyPresets.day.skyDome),
            ambient: new THREE.Color(skyPresets.day.ambient),
            ambientI: skyPresets.day.ambientI,
            sun: new THREE.Color(skyPresets.day.sun),
            sunI: skyPresets.day.sunI,
            sunX: 20, sunY: 40, sunZ: 10,
            hemiSky: new THREE.Color(skyPresets.day.hemiSky),
            hemiGround: new THREE.Color(skyPresets.day.hemiGround),
            hemiI: skyPresets.day.hemiI,
            stars: 0,
            sunElev: 50, moonElev: -30, moonAz: DAY_SUN_AZ
        };
        let skyTarget = 'day';

        function applySkyTarget(name) {
            skyTarget = name; // 仅设置目标，过渡由 updateSkyTransition 完成
        }

        function updateSkyTransition(dt) {
            const p = skyPresets[skyTarget];
            const ease = 1 - Math.exp(-0.12 * dt); // ~30秒完成95%过渡

            skyNow.bg.lerp(new THREE.Color(p.bg), ease);
            skyNow.fog.lerp(new THREE.Color(p.fog), ease);
            skyNow.skyDome.lerp(new THREE.Color(p.skyDome), ease);
            skyNow.ambient.lerp(new THREE.Color(p.ambient), ease);
            skyNow.sun.lerp(new THREE.Color(p.sun), ease);
            skyNow.hemiSky.lerp(new THREE.Color(p.hemiSky), ease);
            skyNow.hemiGround.lerp(new THREE.Color(p.hemiGround), ease);

            skyNow.ambientI += (p.ambientI - skyNow.ambientI) * ease;
            skyNow.sunI    += (p.sunI    - skyNow.sunI)    * ease;
            skyNow.hemiI   += (p.hemiI   - skyNow.hemiI)   * ease;
            skyNow.sunX    += (p.sunX    - skyNow.sunX)    * ease;
            skyNow.sunY    += (p.sunY    - skyNow.sunY)    * ease;
            skyNow.sunZ    += (p.sunZ    - skyNow.sunZ)    * ease;
            skyNow.fogNear += (p.fogNear - skyNow.fogNear) * ease;
            skyNow.fogFar  += (p.fogFar  - skyNow.fogFar)  * ease;
            skyNow.stars   += (p.stars   - skyNow.stars)   * ease;
            skyNow.sunElev += (p.sunElev - skyNow.sunElev) * ease;
            skyNow.moonElev += (p.moonElev - skyNow.moonElev) * ease;
            skyNow.moonAz  += (p.moonAz  - skyNow.moonAz)  * ease;

            // 应用到场景
            scene.background.copy(skyNow.bg);
            scene.fog.color.copy(skyNow.fog);
            scene.fog.near = skyNow.fogNear;
            scene.fog.far  = skyNow.fogFar;
            renderer.setClearColor(skyNow.bg);
            skyDomeMat.color.copy(skyNow.skyDome);
            ambientLight.color.copy(skyNow.ambient);
            ambientLight.intensity = skyNow.ambientI;
            sunLight.color.copy(skyNow.sun);
            sunLight.intensity = skyNow.sunI;
            sunLight.position.set(skyNow.sunX, skyNow.sunY, skyNow.sunZ);
            hemiLight.color.copy(skyNow.hemiSky);
            hemiLight.groundColor.copy(skyNow.hemiGround);
            hemiLight.intensity = skyNow.hemiI;

            // ── 太阳跟随光照方向，月亮用独立方位角 ──
            const sunAzimuth = Math.atan2(skyNow.sunX, skyNow.sunZ);
            const D2R = Math.PI / 180;

            function placeSprite(sprite, azimuth, elevDeg, dist) {
                const el = elevDeg * D2R;
                const cosEl = Math.cos(el);
                sprite.position.x = Math.sin(azimuth) * cosEl * dist;
                sprite.position.y = Math.sin(el) * dist + 1.6;
                sprite.position.z = Math.cos(azimuth) * cosEl * dist;
            }
            placeSprite(sunSprite, sunAzimuth, skyNow.sunElev, 45);
            placeSprite(moonSprite, skyNow.moonAz, skyNow.moonElev, 42);

            // 透明度：仰角 > -3° 开始淡入，> 5° 完全可见
            sunSprite.material.opacity  = Math.max(0, Math.min(1, (skyNow.sunElev + 3) / 8));
            moonSprite.material.opacity = Math.max(0, Math.min(1, (skyNow.moonElev + 3) / 8));

            // ── 星空闪烁 + 缓慢旋转（白天直接关闭，不占性能）──
            const starsActive = skyNow.stars > 0.01;
            if (starsActive) {
                const now = performance.now() * 0.001;
                starLayers.forEach((sf, idx) => {
                    sf.visible = true;
                    sf.rotation.y += dt * (0.015 + idx * 0.01);
                    const base = skyNow.stars * (0.7 + idx * 0.15);
                    const flicker = 0.85 + 0.15 * Math.sin(now * 1.7 + idx * 2.1);
                    sf.material.opacity = Math.min(1, base * flicker);
                });
            } else {
                starLayers.forEach(sf => { sf.visible = false; });
            }
        }

        // ── 时间切换按钮 ──
        const timeBtns = {
            day: document.getElementById('btn-day'),
            dusk: document.getElementById('btn-dusk'),
            night: document.getElementById('btn-night')
        };
        function setActiveTimeBtn(name) {
            Object.keys(timeBtns).forEach(k => timeBtns[k].classList.remove('active'));
            if (timeBtns[name]) timeBtns[name].classList.add('active');
        }
        timeBtns.day.addEventListener('click', () => { applySkyTarget('day'); setActiveTimeBtn('day'); });
        timeBtns.dusk.addEventListener('click', () => { applySkyTarget('dusk'); setActiveTimeBtn('dusk'); });
        timeBtns.night.addEventListener('click', () => { applySkyTarget('night'); setActiveTimeBtn('night'); });

        // ── VR 手柄切天空：左手 X/Y 键循环切换 ──
        const skyCycle = ['day', 'dusk', 'night'];
        function cycleSky(direction = 1) {
            const idx = skyCycle.indexOf(skyTarget);
            const next = skyCycle[(idx + direction + 3) % 3];
            applySkyTarget(next);
            setActiveTimeBtn(next);
        }
        let prevLeftX = false, prevLeftY = false;
        function checkVRSkySwitch() {
            if (leftBtnState.btnX && !prevLeftX) cycleSky(1);
            if (leftBtnState.btnY && !prevLeftY) cycleSky(-1);
            prevLeftX = leftBtnState.btnX;
            prevLeftY = leftBtnState.btnY;
        }

        // ── 如来神掌释放（左手握柄侧键，两段式）──
        let prevLeftGrip = false;
        function checkBuddhaPalmTrigger() {
            if (!buddhaPalmReady || buddhaPalmCooldown > 0) return;
            if (leftBtnState.grip && !prevLeftGrip) {
                if (buddhaPalmState === 'IDLE') {
                    enterAimingMode();           // 第一次：升空瞄准
                } else if (buddhaPalmState === 'AIMING') {
                    releaseBuddhaPalm();          // 第二次：释放
                }
            }
            prevLeftGrip = leftBtnState.grip;
        }
        /*  子弹参数速查表（修改下方数值即可调整）
            --------------------------------------------------
            发射口位置(相对于右手控制器):  muzzleLocal (0, 0, -0.2)
                                           X=0      左右偏移
                                           Y=0      上下偏移
                                           Z=-0.2   前后偏移（负=前方）
            --------------------------------------------------
            子弹大小:                      SphereGeometry(0.03, 8, 8)
                                           0.03 = 半径（米）
            --------------------------------------------------
            子弹颜色:                      color: 0xffaa00 (橙黄)
                                           emissive: 0xff4400 (发光橙红)
                                           emissiveIntensity: 0.8 (发光强度)
            --------------------------------------------------
            子弹速度:                      BULLET_SPEED = 15 (米/秒)
            --------------------------------------------------
            子弹寿命:                      BULLET_LIFE = 3 (秒)
            --------------------------------------------------
            射击冷却:                      SHOOT_COOLDOWN = 150 (毫秒，见上方)
            --------------------------------------------------
        */
        const bullets = [];
        const bulletGroup = new THREE.Group();
        scene.add(bulletGroup);
        const BULLET_SPEED = 15;   // <-- 子弹飞行速度（米/秒）
        const BULLET_LIFE = 2;     // <-- 子弹存活时间（秒）

        // ==================== 子弹对象池（消除 GC） ====================
        const BULLET_POOL_SIZE = 20;
        const sharedBulletGeom = new THREE.SphereGeometry(0.02, 8, 8);
        const sharedBulletMat = new THREE.MeshStandardMaterial({
            color: 0xffaa00,
            emissive: 0xff4400,
            emissiveIntensity: 0.8
        });
        const bulletPool = [];

        function initBulletPool() {
            for (let i = 0; i < BULLET_POOL_SIZE; i++) {
                const mesh = new THREE.Mesh(sharedBulletGeom, sharedBulletMat);
                mesh.userData = { active: false, vel: new THREE.Vector3(), life: 0 };
                mesh.visible = false;
                bulletGroup.add(mesh);
                bulletPool.push(mesh);
            }
        }
        initBulletPool();

        function acquireBullet() {
            for (let i = 0; i < bulletPool.length; i++) {
                if (!bulletPool[i].userData.active) return bulletPool[i];
            }
            return null; // 池已满
        }

        // ==================== 子弹发射角度标注区 ====================
        /*  如需修改子弹发射角度，在下方 shootBullet 中修改：
            --------------------------------------------------
            发射口位置(相对于右手控制器本地坐标):
                muzzleLocal = (0, 0, -0.2)
                X=0      左右偏移（米）
                Y=0      上下偏移（米）
                Z=-0.2   前后偏移（负=前方，米）
            --------------------------------------------------
            方向计算:
                dir = (0, 0, -1) 应用控制器的旋转(quat)
                = 沿控制器 Z 轴负方向（正前方）
            --------------------------------------------------
            【修改角度示例】在 dir 计算后添加以下代码：

            // 固定俯仰偏移（抬头/低头）
            const bulletPitch = -30 * Math.PI / 180;  // <-- -15度，负=低头
            const aimQuat = new THREE.Quaternion();
            aimQuat.setFromEuler(new THREE.Euler(bulletPitch, 0, 0));
            dir.applyQuaternion(aimQuat);

            // 或固定偏航偏移（左右摆动）
            const bulletYaw = 5 * Math.PI / 180;  // <-- +5度，正=左偏
            const aimQuat = new THREE.Quaternion();
            aimQuat.setFromEuler(new THREE.Euler(0, bulletYaw, 0));
            dir.applyQuaternion(aimQuat);

            // 或同时修改俯仰+偏航
            const aimQuat = new THREE.Quaternion();
            aimQuat.setFromEuler(new THREE.Euler(bulletPitch, bulletYaw, 0));
            dir.applyQuaternion(aimQuat);
            --------------------------------------------------
        */
        function shootBullet(controller) {
            // 主子弹
            fireOneBullet(controller);
            
            // 如果启用额外子弹，再发射一颗（偏移一点）
            if (extraBulletEnabled) {
                setTimeout(() => fireOneBullet(controller), 50);
            }
        }
        
        function fireOneBullet(controller) {
            const bullet = acquireBullet();
            if (!bullet) return; // 池已满，跳过本次射击

            initAudio(); // 用户首次射击时初始化 AudioContext
            playShootSound();

            // 发射口在控制器本地坐标系中的位置（修改这里调整子弹出膛位置）
            const muzzleLocal = new THREE.Vector3(0, 0, -0.2);
            const origin = muzzleLocal.clone().applyMatrix4(controller.matrixWorld);
            const quat = controller.getWorldQuaternion(new THREE.Quaternion());

            // ── 俯仰偏移在控制器本地坐标系中计算，避免水平转动时角度串扰 ──
            // 先在本地空间构造俯仰四元数，再与控制器世界朝向合成
            const bulletPitch = -30 * Math.PI / 180; // 负=向下低头（修改此处）
            const localPitchQuat = new THREE.Quaternion().setFromEuler(
                new THREE.Euler(bulletPitch, 0, 0)
            );
            // 合成：先控制器旋转，再本地俯仰 → 方向始终相对枪管轴
            const finalQuat = quat.clone().multiply(localPitchQuat);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(finalQuat);

            bullet.position.copy(origin);
            bullet.userData.active = true;
            bullet.userData.vel.copy(dir.normalize().multiplyScalar(BULLET_SPEED));
            bullet.userData.life = BULLET_LIFE;
            bullet.visible = true;
            bullets.push(bullet);
        }

        function updateBullets(dt) {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.x += b.userData.vel.x * dt;
                b.position.y += b.userData.vel.y * dt;
                b.position.z += b.userData.vel.z * dt;
                b.userData.life -= dt;

                // 超出范围或生命结束则回池
                if (b.userData.life <= 0 || b.position.y < 0 || b.position.y > 30) {
                    b.userData.active = false;
                    b.visible = false;
                    bullets.splice(i, 1);
                }
            }
        }

        // ==================== 气球战斗系统配置 ====================
        /*  气球参数速查表（修改下方数值即可调整）
            --------------------------------------------------
            气球数量:                      BALLOON_COUNT = 10
            --------------------------------------------------
            气球生命值:                    BALLOON_HP = 100
            --------------------------------------------------
            气球移动速度:                  BALLOON_SPEED = 1.0 (米/秒)
            --------------------------------------------------
            生成距离:                      BALLOON_SPAWN_RADIUS = 10 (米)
                                           玩家初始位置方圆10米外
            --------------------------------------------------
            气球半径:                      BALLOON_RADIUS = 0.5 (米)
            --------------------------------------------------
            打破气球得分:                  BALLOON_SCORE = 10
            --------------------------------------------------
            子弹伤害:                      BULLET_DAMAGE = 30 (每发)
            --------------------------------------------------
        */
        const balloons = [];
        const balloonGroup = new THREE.Group();
        scene.add(balloonGroup);
        const BALLOON_SPEED = 0.5;         // <-- 气球移动速度（米/秒）
        const BALLOON_SPAWN_RADIUS = 15;  // <-- 生成距离玩家半径（米）
        const BALLOON_COUNT = 10;          // <-- 气球数量
        const BALLOON_HP = 100;            // <-- 气球生命值
        const BALLOON_SCORE = 10;          // <-- 打破气球得分
        const BALLOON_RADIUS = 0.5;        // <-- 气球半径（米）
        const BULLET_DAMAGE = 30;          // <-- 子弹伤害
        const BALLOON_COLORS = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff, 0xff88ff, 0x88ffff];

        function createBalloon(x, y, z) {
            const geom = new THREE.SphereGeometry(BALLOON_RADIUS, 16, 16);
            const color = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
            const mat = new THREE.MeshStandardMaterial({
                map: balloonTex.image ? balloonTex : null,  // 笑脸贴图
                color: color,                                 // 随机染色
                roughness: 0.3,
                metalness: 0.1,
                emissive: color,                              // 自发光（同色微光）
                emissiveIntensity: 0.15
            });
            const balloon = new THREE.Mesh(geom, mat);
            balloon.position.set(x, y, z);
            balloon.castShadow = true;
            balloon.userData = { active: true, hp: BALLOON_HP, maxHp: BALLOON_HP, isKnight: false, radius: BALLOON_RADIUS };
            balloonGroup.add(balloon);
            balloons.push(balloon);
            return balloon;
        }

        // ── 骑士气球配置 ──
        const KNIGHT_HP = 500;            // 骑士生命值
        const KNIGHT_SCORE = 30;          // 骑士得分
        const KNIGHT_SCALE = 3;           // 骑士模型缩放
        const KNIGHT_RADIUS = 0.5 * KNIGHT_SCALE; // 碰撞半径随缩放变化

        function createKnightBalloon(x, y, z) {
            if (!knightModel) return createBalloon(x, y, z);
            const knight = knightModel.clone();
            knight.scale.setScalar(KNIGHT_SCALE);
            knight.position.set(x, y, z);
            knight.traverse(child => { if (child.isMesh) child.castShadow = true; });
            knight.userData = { active: true, hp: KNIGHT_HP, maxHp: KNIGHT_HP, isKnight: true, radius: KNIGHT_RADIUS };
            balloonGroup.add(knight);
            balloons.push(knight);
            return knight;
        }

        function disposeBalloon(b) {
            if (b.userData.isKnight) {
                b.traverse(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                        else child.material.dispose();
                    }
                });
            } else {
                b.geometry.dispose();
                b.material.dispose();
            }
            balloonGroup.remove(b);
        }

        function spawnBalloons() {
            // 清除旧气球
            balloons.forEach(b => disposeBalloon(b));
            balloons.length = 0;

            // 计算骑士数量（第0波0个，第1波起1~3个）
            const knightCount = (waveNumber >= 1)
                ? Math.min(3, 1 + Math.floor(Math.random() * 3))
                : 0;
            const normalCount = BALLOON_COUNT - knightCount;

            const playerPos = dolly.position.clone();
            // 随机挑出骑士位置
            const indices = Array.from({length: BALLOON_COUNT}, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            const knightIndices = new Set(indices.slice(0, knightCount));

            for (let i = 0; i < BALLOON_COUNT; i++) {
                const angle = (Math.PI * 2 / BALLOON_COUNT) * i + Math.random() * 0.5;
                const r = BALLOON_SPAWN_RADIUS + Math.random() * 3;
                const x = playerPos.x + Math.cos(angle) * r;
                const z = playerPos.z + Math.sin(angle) * r;
                const y = 1.5 + Math.random() * 3;
                if (knightIndices.has(i)) {
                    createKnightBalloon(x, y, z);
                } else {
                    createBalloon(x, y, z);
                }
            }
        }

        function updateBalloons(dt) {
            const playerPos = dolly.position.clone();
            playerPos.y += 1.6; // 对准玩家头部高度

            for (let i = balloons.length - 1; i >= 0; i--) {
                const b = balloons[i];
                if (!b.userData.active) continue;

                // 向玩家移动
                const dir = new THREE.Vector3().subVectors(playerPos, b.position).normalize();
                b.position.x += dir.x * BALLOON_SPEED * dt;
                b.position.y += dir.y * BALLOON_SPEED * dt;
                b.position.z += dir.z * BALLOON_SPEED * dt;

                // 面朝玩家（普通气球旋转贴图；骑士模型整体转向）
                if (!b.userData.isKnight) {
                    b.lookAt(playerPos);
                    b.rotateY(-Math.PI / 2);
                } else {
                    b.lookAt(playerPos);
                }

                // 漂浮动画
                b.position.y += Math.sin(performance.now() * 0.003 + i) * 0.002;
            }
        }

        function checkBulletBalloonCollisions() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                for (let j = balloons.length - 1; j >= 0; j--) {
                    const balloon = balloons[j];
                    if (!balloon.userData.active) continue;

                    const hitRadius = balloon.userData.radius || BALLOON_RADIUS;
                    const dist = bullet.position.distanceTo(balloon.position);
                    if (dist < hitRadius + 0.05) {
                        // 受伤
                        balloon.userData.hp -= playerStats.atk;

                        // 击中闪烁（仅普通气球有 emissiveIntensity）
                        if (!balloon.userData.isKnight && balloon.material.emissiveIntensity !== undefined) {
                            balloon.material.emissiveIntensity = 0.5;
                            setTimeout(() => {
                                if (balloon.userData) balloon.material.emissiveIntensity = 0.15;
                            }, 100);
                        }

                        // 检查是否被打破
                        if (balloon.userData.hp <= 0) {
                            balloon.userData.active = false;
                            if (balloon.userData.isKnight) {
                                balloon.traverse(c => { if (c.isMesh) c.visible = false; });
                            } else {
                                balloon.visible = false;
                            }
                            playerStats.score += balloon.userData.isKnight ? KNIGHT_SCORE : BALLOON_SCORE;
                            playBalloonPopSound();
                        }
                        // 子弹销毁
                        bullet.userData.active = false;
                        bullet.visible = false;
                        bullets.splice(i, 1);

                        checkAllBalloonsDestroyed();
                        break;
                    }
                }
            }
        }

        function checkAllBalloonsDestroyed() {
            const activeBalloons = balloons.filter(b => b.userData.active);
            if (activeBalloons.length === 0 && !choiceCardsActive) {
                // 所有气球都被打破，弹出选择卡
                spawnChoiceCards();
            }
        }

        // ==================== 选择卡系统配置 ====================
        /*  选择卡参数速查表（修改下方数值即可调整）
            --------------------------------------------------
            选择卡距离玩家:                CHOICE_CARD_DISTANCE = 2.5 (米)
            --------------------------------------------------
            选择卡尺寸:                    宽 0.5米, 高 0.3米
            --------------------------------------------------
            选择卡存在时间:                10秒（超时自动消失）
            --------------------------------------------------
            选择卡效果:
                [0] 生命值+100
                [1] 攻击力+20
                [2] 射击额外发射一颗子弹
            --------------------------------------------------
        */
        let choiceCardsActive = false;
        let extraBulletEnabled = false; // 是否启用额外子弹
        let selectedCardIndex = -1;     // 当前高亮的选择卡索引
        let cardHighlightTime = 0;      // 选择卡高亮计时
        let choiceCardTimeout = null;   // 选择卡超时自动关闭计时器
        const choiceCardGroup = new THREE.Group();
        // 挂到 dolly（跟随玩家的组），保证 VR 中坐标系正确
        dolly.add(choiceCardGroup);
        const CHOICE_CARD_DISTANCE = 1.5; // 选择卡距离玩家（米），改为1.5避免太近

        const choiceOptions = [
            { 
                label: '生命值+100', 
                color: { r: 255, g: 60, b: 60 },
                effect: () => { 
                    playerStats.hp += 100; 
                    console.log('✅ 选择了：生命值+100'); 
                }
            },
            { 
                label: '攻击力+20',  
                color: { r: 255, g: 180, b: 0 },
                effect: () => {

        function spawnChoiceCards() {
            if (choiceCardsActive) return;
            choiceCardsActive = true;
            selectedCardIndex = -1;
            cardHighlightTime = 0;

            // 清除旧选择卡
            while (choiceCardGroup.children.length > 0) {
                const child = choiceCardGroup.children[0];
                if (child.material.map) child.material.map.dispose();
                child.material.dispose();
                child.geometry.dispose();
                choiceCardGroup.remove(child);
            }

            // ── 选择卡在 dolly 局部坐标系中布置（VR/非VR 都正确）──
            // 相机在 dolly 中的位置（通常是 (0,1.6,0)）
            const camLocalPos = camera.position.clone(); // dolly 局部坐标
            // 相机在 dolly 中的朝向
            const camLocalDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            camLocalDir.y = 0; // 水平化，避免卡片上下偏斜
            if (camLocalDir.lengthSq() < 0.001) camLocalDir.set(0, 0, -1);
            camLocalDir.normalize();

            // 选择卡基础位置：玩家前方 CHOICE_CARD_DISTANCE 米，固定在眼睛高度
            const basePos = camLocalPos.clone().add(camLocalDir.clone().multiplyScalar(CHOICE_CARD_DISTANCE));
            basePos.y = camLocalPos.y - 0.2; // 眼高略偏下，方便看到

            // 相机右方向（dolly 局部坐标）
            const camLocalRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            camLocalRight.y = 0;
            camLocalRight.normalize();

            // 面朝玩家的方向（在dolly坐标系中）
            const faceTarget = camLocalPos.clone(); // 朝向玩家眼睛

            for (let i = 0; i < 3; i++) {
                const card = createChoiceCard(choiceOptions[i], i);
                const offset = (i - 1) * 0.55; // 三张卡横向排列，间距 0.55 米
                card.position.copy(basePos).addScaledVector(camLocalRight, offset);
                card.lookAt(faceTarget);
                choiceCardGroup.add(card);
            }

            console.log('🎴 选择卡已生成，等待左手柄碰触...');
            
            // 超时保护：10 秒内未选择则自动进入下一轮（防止黑屏卡死）
            if (choiceCardTimeout) clearTimeout(choiceCardTimeout);
            choiceCardTimeout = setTimeout(() => {
                if (choiceCardsActive) {
                    console.log('⏱️ 选择卡超时，自动跳过进入下一轮');
                    clearChoiceCards();
                }
            }, 10000);
        }

        function spawnParticles(position, color, count = 30) {
            for (let i = 0; i < count; i++) {
                const p = particlePool.find(p => !p.userData.active);
                if (!p) break;
                
                p.position.copy(position);
                p.userData.active = true;
                p.userData.life = PARTICLE_LIFE;
                p.userData.vel.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
                p.material.color.setHex(color);
                p.material.opacity = 1.0;
                p.visible = true;
            }
        }
        
        function updateParticles(dt) {
            for (let i = 0; i < particlePool.length; i++) {
                const p = particlePool[i];
                if (!p.userData.active) continue;
                
                p.position.addScaledVector(p.userData.vel, dt);
                p.userData.vel.multiplyScalar(0.98); // 阻尼
                p.userData.life -= dt;
                p.material.opacity = Math.max(0, p.userData.life / PARTICLE_LIFE);
                
                if (p.userData.life <= 0) {
                    p.userData.active = false;
                    p.visible = false;
                }
            }

        function createCartoonCloudTexture(size = 512, cloudCount = 25) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);

            function drawCloud(cx, cy, baseR) {
                const parts = [
                    [0, 0, baseR],
                    [-baseR * 0.7, -baseR * 0.3, baseR * 0.8],
                    [baseR * 0.7, -baseR * 0.3, baseR * 0.9],
                    [-baseR * 0.4, -baseR * 0.7, baseR * 0.7],
                    [baseR * 0.4, -baseR * 0.7, baseR * 0.75],
                    [0, -baseR * 0.9, baseR * 0.7],
                ];
                ctx.fillStyle = '#000000';
                parts.forEach(([dx, dy, r]) => {
                    ctx.beginPath();
                    ctx.arc(cx + dx, cy + dy, r + 2, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.fillStyle = '#ffffff';
                parts.forEach(([dx, dy, r]) => {
                    ctx.beginPath();
                    ctx.arc(cx + dx, cy + dy, r, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            const margin = size * 0.1;
            for (let i = 0; i < cloudCount; i++) {
                const cx = margin + Math.random() * (size - margin * 2);
                const cy = margin + Math.random() * (size - margin * 2);
                const r = size * 0.04 + Math.random() * size * 0.06;
                drawCloud(cx, cy, r);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

            释放神掌缩放:                 20.0（搜索 palm.scale.setScalar）
            释放神掌碰撞半径:             10（搜索 killRadius）
            释放神掌伤害:                 1000（搜索 damage: 1000）
            --------------------------------------------------
            神掌出现前方距离:             5 米（搜索 addScaledVector）
            神掌出现高度(头顶上方):       15 米（搜索 palm.position.y += 15）
            神掌下落时间:                 1.0 秒（搜索 fallDuration）
            神掌落地后消失延迟:           0.5 秒（搜索 cleanupDelay）
            瞄准超时(自动释放):           5 秒（搜索 AIM_TIMEOUT）
            技能冷却:                     8 秒（搜索 BUDDHA_COOLDOWN）
            --------------------------------------------------
        */
        let buddhaPalmModel = null;
        let buddhaPalmReady = false;
        let buddhaPalmAttached = false;
        const BUDDHA_COOLDOWN = 8;       // <-- 技能冷却(秒)
        let buddhaPalmCooldown = 0;
        const buddhaPalmSkills = [];

        // 状态机: IDLE → AIMING → SLAMMING → IDLE(冷却)
        let buddhaPalmState = 'IDLE';
        let buddhaPalmTimer = 0;
        const AIM_TIMEOUT = 5;           // <-- 瞄准超时自动释放(秒)
        let promptSprite = null;

        function createPromptSprite() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, 512, 128);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 36px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🖐️ 再按握柄释放如来神掌', 256, 55);
            ctx.fillStyle = '#aaa';
            ctx.font = '24px "Microsoft YaHei", sans-serif';
            ctx.fillText('或 5 秒后自动释放', 256, 95);
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, depthWrite: false });
            const s = new THREE.Sprite(mat);
            s.scale.set(2, 0.5, 1);
            s.visible = false;
            return s;
        }

        gltfLoader.load(
            'Model/如来神掌.glb',
            (gltf) => {
                buddhaPalmModel = gltf.scene;
                console.log('✅ 如来神掌模型加载成功');
            },
            undefined,
            () => console.warn('⚠️ 如来神掌模型未找到')
        );

        function attachBuddhaPalmToLeft() {
            if (!buddhaPalmModel || !leftGrip || buddhaPalmAttached) return;
            const palm = buddhaPalmModel.clone();
            palm.scale.setScalar(0.2);             // <-- 左手神掌大小
            palm.position.set(0, -0.08, 0.03);    // <-- 左手神掌位置(X,Y,Z)
            palm.rotation.set(-90, 0, 0);              // <-- 左手神掌旋转(X,Y,Z)弧度
            palm.traverse(c => { if (c.isMesh) c.castShadow = true; });
            palm.userData = { isBuddhaPalm: true };
            leftGrip.add(palm);
            buddhaPalmAttached = true;
            promptSprite = createPromptSprite();
            promptSprite.position.set(0, 1.8, -1.5); // <-- 提示文字位置(X,Y,Z)
            dolly.add(promptSprite);
            console.log('🖐️ 如来神掌已装备到左手');
        }

        let previewPalm = null;
        let aimDirection = new THREE.Vector3(); // 第一次按握柄时锁定的朝向

        function enterAimingMode() {
            buddhaPalmState = 'AIMING';
            buddhaPalmTimer = AIM_TIMEOUT;
            // 锁定当前玩家朝向
            aimDirection.set(0, 0, -1).applyQuaternion(camera.quaternion);
            aimDirection.y = 0; aimDirection.normalize();
            // 前方生成预览神掌
            if (buddhaPalmModel && !previewPalm) {
                previewPalm = buddhaPalmModel.clone();
                previewPalm.scale.setScalar(2.0);                 // <-- 预览神掌大小
                previewPalm.rotation.set(-Math.PI / 2, 0, 0);
                previewPalm.traverse(c => { if (c.isMesh) c.castShadow = true; });
                previewPalm.userData = { isPreview: true };
                dolly.add(previewPalm);
            }
            if (previewPalm) {
                previewPalm.visible = true;
                previewPalm.position.set(0, 0.5, -4);
            }
            if (promptSprite) promptSprite.visible = true;
            console.log('🎯 瞄准：再按握柄释放，或' + AIM_TIMEOUT + '秒自动');
        }

        function releaseBuddhaPalm() {
            if (!buddhaPalmModel) return;
            if (promptSprite) promptSprite.visible = false;
            if (previewPalm) { previewPalm.visible = false; }
            buddhaPalmState = 'SLAMMING';
            buddhaPalmCooldown = BUDDHA_COOLDOWN;

            // 用第一次锁定的朝向生成 20x 神掌
            const palm = buddhaPalmModel.clone();
            palm.scale.setScalar(20.0);             // <-- 释放神掌大小(20倍)
            palm.rotation.set(-Math.PI / 2, 0, 0); // <-- 掌心朝下
            palm.traverse(c => { if (c.isMesh) c.castShadow = true; });
            const camWorld = new THREE.Vector3();
            camera.getWorldPosition(camWorld);
            palm.position.copy(camWorld).addScaledVector(aimDirection, 3); // <-- 前方5米
            palm.position.y += 20;                   // <-- 头顶上方15米
            palm.userData = {
                isBuddhaSkill: true,
                elapsed: 0,
                startY: palm.position.y,
                targetY: camWorld.y,
                fallDuration: 0.5,         // <-- 下落时间(秒)
                killRadius: 10,            // <-- 碰撞半径(米)
                damage: 1000               // <-- 伤害值
            };
            scene.add(palm);
            buddhaPalmSkills.push(palm);
            console.log('🖐 如来神掌释放！20x从' + palm.position.y.toFixed(1) + 'm落下');
        }

        function updateBuddhaPalmSkills(dt) {
            if (buddhaPalmCooldown > 0) buddhaPalmCooldown -= dt;

            // 瞄准倒计时（预览神掌跟随锁定方向）
            if (buddhaPalmState === 'AIMING') {
                buddhaPalmTimer -= dt;
                if (previewPalm && previewPalm.visible) {
                    const offset = aimDirection.clone().multiplyScalar(4);
                    offset.y = 0.5;
                    previewPalm.position.copy(offset);
                }
                if (promptSprite && promptSprite.visible && buddhaPalmTimer > 0) {
                    const remain = Math.ceil(buddhaPalmTimer);
                    const cvs = promptSprite.material.map.source.data;
                    if (cvs) {
                        const c = cvs.getContext('2d');
                        c.fillStyle = 'rgba(0,0,0,0.7)';
                        c.fillRect(0, 0, 512, 128);
                        c.fillStyle = '#ffd700';
                        c.font = 'bold 36px "Microsoft YaHei", sans-serif';
                        c.textAlign = 'center';
                        c.fillText('🖐 再按握柄释放如来神掌', 256, 55);
                        c.fillStyle = '#aaa';
                        c.font = '24px "Microsoft YaHei", sans-serif';
                        c.fillText('或 ' + remain + ' 秒后自动释放', 256, 95);
                        promptSprite.material.map.needsUpdate = true;
                    }
                }
                if (buddhaPalmTimer <= 0) releaseBuddhaPalm();
            }

            // 神掌下落
            for (let i = buddhaPalmSkills.length - 1; i >= 0; i--) {
                const palm = buddhaPalmSkills[i];
                const ud = palm.userData;
                ud.elapsed += dt;

                const t = Math.min(1, ud.elapsed / ud.fallDuration);
                palm.position.y = ud.startY + (ud.targetY - ud.startY) * t;

                if (t >= 1 && !ud.landed) {
                    ud.landed = true;
                    palm.position.y = ud.targetY;
                    const pw = new THREE.Vector3(); palm.getWorldPosition(pw);
                    let killed = 0;
                    balloons.forEach(b => {
                        if (!b.userData.active) return;
                        if (b.position.distanceTo(pw) < ud.killRadius) {
                            b.userData.hp -= ud.damage;
                            if (b.userData.hp <= 0) {
                                b.userData.active = false;
                                if (b.userData.isKnight) { b.traverse(c => { if (c.isMesh) c.visible = false; }); playerStats.score += KNIGHT_SCORE; }
                                else { b.visible = false; playerStats.score += BALLOON_SCORE; }
                                killed++;
                            }
                        }
                    });
                    console.log('🖐 神掌击杀 ' + killed + '（20x, 半径10, 伤害1000）');
                    spawnParticles(pw, 0xffdd44, 80);
                    playBalloonPopSound();
                    checkAllBalloonsDestroyed();
                    ud.cleanupDelay = 0.3; // <-- 落地后0.5秒消失
                }

                if (ud.cleanupDelay !== undefined) {
                    ud.cleanupDelay -= dt;
                    if (ud.cleanupDelay <= 0) {
                        palm.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
                        scene.remove(palm);
                        buddhaPalmSkills.splice(i, 1);
                        buddhaPalmState = 'IDLE';
                    }
                }
            }
        }

        function createControllerModel(isRight) {
            const group = new THREE.Group();

            // 激光已移除，手柄模型为空（AK48 枪支在 attachAK48 中单独附加）

            return group;
        }

        function setupController(idx) {
            const controller = renderer.xr.getController(idx);
            const grip = renderer.xr.getControllerGrip(idx);
            const model = createControllerModel(idx === 1);
            grip.add(model);
            dolly.add(controller);
            dolly.add(grip);
            controllers.push(controller);
            
            if (idx === 1) {
                rightGrip = grip;
                attachAK48();

                leftGrip = grip;
                const leftPanel = createLeftDebugPanel();

            }
            
            if (idx === 0) leftController = controller;
            else rightController = controller;
        }

        // ==================== AK48 枪支配置区 ====================
        /*  枪支参数速查表（修改下方数值即可调整）
            --------------------------------------------------
            枪支整体缩放:                  AK48_SCALE = 0.6
                                           1.0 = 原始大小，0.6 = 60%
            --------------------------------------------------
            枪支位置(相对于右手柄):        position.set(0, -0.1, 0.01)
                                           X=0       左右偏移（正=右，负=左）
                                           Y=-0.1    上下偏移（正=上，负=下）
                                           Z=0.01    前后偏移（正=后，负=前）
            --------------------------------------------------
            枪支角度(相对于右手柄):        rotation.x = -20
                                           rotation.y = Math.PI / 2 (即90度)
                                           rotation.z = 0 (未设置，默认0)
                                           注意：rotation.x = -20 是弧度值
                                           如需角度制：-20 * Math.PI / 180 ≈ -0.349 弧度
            --------------------------------------------------
        */
        const AK48_SCALE = 0.6;   // <-- 调整枪支整体大小

        // 附加 AK48 到右手柄
        function attachAK48() {
            console.log('attachAK48 被调用', { 
                hasModel: !!ak48Model, 
                hasRightGrip: !!rightGrip, 
                alreadyAttached: ak48Attached 
            });
            
            if (!ak48Model) { console.log('AK48 模型尚未加载，跳过'); return; }
            if (!rightGrip) { console.log('右手柄尚未初始化，跳过'); return; }
            if (ak48Attached) { console.log('AK48 已附加，跳过'); return; }
            
            const gunInstance = ak48Model.clone();
            
            // 计算原始尺寸并应用缩放
            const box = new THREE.Box3().setFromObject(gunInstance);
            const size = new THREE.Vector3();
            box.getSize(size);
            console.log('AK48 原始尺寸:', size.x.toFixed(3), size.y.toFixed(3), size.z.toFixed(3));
            console.log('AK48 当前缩放值:', AK48_SCALE, '→ 缩放后长度约:', (Math.max(size.x, size.y, size.z) * AK48_SCALE).toFixed(3), '米');
            
            gunInstance.scale.set(AK48_SCALE, AK48_SCALE, AK48_SCALE);
            
            gunInstance.traverse((child) => {
                if (child.isMesh) child.castShadow = true;
            });
            
            // ==================== 枪支位置和角度微调区 ====================
            // 修改以下三行来调整枪在手柄上的位置和朝向
            gunInstance.position.set(0, -0.1, 0.01);  // <-- 位置 XYZ（米）
            gunInstance.rotation.x = -20;             // <-- X轴旋转（当前为-20弧度，约-1146度）
            gunInstance.rotation.y = Math.PI / 2;     // <-- Y轴旋转 90度（枪管朝前）
            
            rightGrip.add(gunInstance);
            ak48Attached = true;
            console.log('AK48 已成功附加到右手柄');
        }

        // 附加 AK48 到左手柄
        function attachAK48ToLeft() {
            console.log('attachAK48ToLeft 被调用', { 
                hasModel: !!ak48Model, 
                hasLeftGrip: !!leftGrip, 
                alreadyAttached: ak48LeftAttached 
            });
            
            if (!ak48Model) { console.log('AK48 模型尚未加载，跳过左手附加'); return; }
            if (!leftGrip) { console.log('左手柄尚未初始化，跳过'); return; }
            if (ak48LeftAttached) { console.log('AK48 已附加到左手，跳过'); return; }
            
            const gunInstance = ak48Model.clone();
            
            // 计算原始尺寸并应用缩放
            const box = new THREE.Box3().setFromObject(gunInstance);
            const size = new THREE.Vector3();
            box.getSize(size);
            console.log('AK48 左手原始尺寸:', size.x.toFixed(3), size.y.toFixed(3), size.z.toFixed(3));
            
            gunInstance.scale.set(AK48_SCALE, AK48_SCALE, AK48_SCALE);
            
            gunInstance.traverse((child) => {
                if (child.isMesh) child.castShadow = true;
            });
            
            // ============================================================
            // 左手枪支 位置 / 旋转 / 缩放 调节区
            // ============================================================
            // position.set(X, Y, Z)
            //   X:  左右偏移（正 = 右，负 = 左）
            //   Y:  上下偏移（正 = 上，负 = 下）  当前: -0.1（向下）
            //   Z:  前后偏移（正 = 后，负 = 前）  当前:  0.01（略偏后）
            gunInstance.position.set(0, -0.1, 0.01);

            // rotation.x  绕 X 轴旋转（枪管俯仰，负 = 枪口朝下）
            //   当前值 -20 是弧度（约 -1146°，Three.js 内部自动折算）
            //   如果想用角度：改为 -20 * Math.PI / 180 ≈ -0.349
            gunInstance.rotation.x = -20;

            // rotation.y  绕 Y 轴旋转（枪管左右）
            //   Math.PI / 2 = 90°  枪口朝正前方
            //   如枪口还是朝后，改为 -Math.PI / 2 或 Math.PI * 1.5 试试
            gunInstance.rotation.y = -90*Math.PI / 180;

            // scale  X 为负 = 镜像翻转（左手持枪关键，与右手对称）
            //   如枪支整体上下颠倒，把 Y 也改为 -AK48_SCALE
            //   如整体前后反转，把 Z 也改为 -AK48_SCALE
            gunInstance.scale.x = -AK48_SCALE; // ← 镜像翻转（左手用）
            gunInstance.scale.y = AK48_SCALE;
            gunInstance.scale.z = AK48_SCALE;
            // ============================================================
            
            leftGrip.add(gunInstance);
            ak48LeftAttached = true;
            console.log('AK48 已成功附加到左手柄');
        }

        renderer.xr.addEventListener('sessionstart', () => {
            setShadow(false); // VR 模式关闭阴影
            setTimeout(() => { attachAK48(); }, 100);
            // 如果启用左手持枪模式，为左手柄也添加枪支
            if (leftHandGunEnabled) {
                setTimeout(() => { attachAK48ToLeft(); }, 100);
            }
            // VR开始时生成气球
            setTimeout(() => {
                if (!gameStarted) {
                    gameStarted = true;
                    spawnBalloons();
                    console.log('🎈 气球战斗开始！');
                }
            }, 500);
        });

        // -------------------- 输入处理 --------------------
        let rightTrigger = false;
        let leftTrigger = false; // 左手扳机状态
        let lastRightShootTime = 0;
        let lastLeftShootTime = 0;

        function updateInputs() {
            const session = renderer.xr.getSession();
            if (!session) return;
            rightInput.stickX = 0; rightInput.stickY = 0;
            leftInput.stickX = 0; leftInput.stickY = 0;
            rightTrigger = false;
            leftTrigger = false; // 重置左手扳机状态
            // 重置按键状态
            Object.keys(leftBtnState).forEach(k => leftBtnState[k] = false);
            Object.keys(rightBtnState).forEach(k => rightBtnState[k] = false);

            if (!session.inputSources) return;
            for (const source of session.inputSources) {
                if (!source.gamepad) continue;
                const gp = source.gamepad;
                const hand = source.handedness;
                let sx = 0, sy = 0;
                if (gp.axes.length >= 4) { sx = gp.axes[2]; sy = gp.axes[3]; }
                else if (gp.axes.length >= 2) { sx = gp.axes[0]; sy = gp.axes[1]; }

                const triggerVal = gp.buttons[0]?.value || 0;
                const trigger = triggerVal > 0.5;
                const grip = gp.buttons[1]?.pressed || false;
                const stickBtn = gp.buttons[3]?.pressed || false;

                if (hand === 'right') {
                    rightInput.stickX = sx; rightInput.stickY = sy;
                    rightTrigger = trigger;
                    rightBtnState.trigger = trigger;
                    rightBtnState.grip = grip;
                    rightBtnState.stickBtn = stickBtn;
                    rightBtnState.btnA = gp.buttons[4]?.pressed || false;
                    rightBtnState.btnB = gp.buttons[5]?.pressed || false;
                } else if (hand === 'left') {
                    leftInput.stickX = sx; leftInput.stickY = sy;
                    leftTrigger = trigger; // 更新左手扳机状态
                    leftBtnState.trigger = trigger;
                    leftBtnState.grip = grip;
                    leftBtnState.stickBtn = stickBtn;
                    leftBtnState.btnX = gp.buttons[4]?.pressed || false;
                    leftBtnState.btnY = gp.buttons[5]?.pressed || false;
                }
            }
        }

        function handleShooting() {
            const now = performance.now();
            
            // 右手射击（独立冷却）
            if (rightController && rightTrigger) {
                if (now - lastRightShootTime > SHOOT_COOLDOWN) {
                    shootBullet(rightController);
                    lastRightShootTime = now;
                }
            }
            
            // 左手射击（如果启用左手持枪模式，独立冷却）
            if (leftHandGunEnabled && leftController && leftTrigger) {
                if (now - lastLeftShootTime > SHOOT_COOLDOWN) {
                    shootBullet(leftController);
                    lastLeftShootTime = now;
                }
            }
        }

        // ==================== 移动范围限制 4×8 ====================
        const BOUND_X = 2, BOUND_Z = 4; // X: ±2(宽4)  Z: ±4(深8)

        function handleMovement(dt) {
            let sx = rightInput.stickX, sy = rightInput.stickY;
            if (Math.abs(sx) < DEADZONE && Math.abs(sy) < DEADZONE) {
                sx = leftInput.stickX; sy = leftInput.stickY;
            }
            if (Math.abs(sx) < DEADZONE && Math.abs(sy) < DEADZONE) {
                return;
            }

            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            right.y = 0; right.normalize();

            // 直接移动 dolly（真实移动，世界物体自然相对运动）
            const speed = MOVE_SPEED * dt;
            sy = -sy; // PICO 摇杆前推为负，取反
            const dx = (forward.x * sy + right.x * sx) * speed;
            const dz = (forward.z * sy + right.z * sx) * speed;
            const nx = dolly.position.x + dx;
            const nz = dolly.position.z + dz;

            dolly.position.x = Math.max(-BOUND_X, Math.min(BOUND_X, nx));
            dolly.position.z = Math.max(-BOUND_Z, Math.min(BOUND_Z, nz));
        }

        function handleExit() {
            const session = renderer.xr.getSession();
            if (!session) return;
            if (!session.inputSources) return;
            for (const src of session.inputSources) {
                if (!src.gamepad) continue;
                if (src.handedness === 'right') {
                    const btnA = src.gamepad.buttons[4]?.pressed;
                    const btnB = src.gamepad.buttons[5]?.pressed;
                    if (btnA || btnB) { session.end(); break; }
                }
            }
        }

        // -------------------- 动画循环 --------------------
        const clock = new THREE.Clock();
        const tempPos = new THREE.Vector3();

        function updateCloudLayers(dt) { /* 已废弃 — dolly 真实移动替代云海滚动 */ }

        let gameStarted = false;
        let waveNumber = 0;          // 波次计数（第0波=初始10个，之后每波出骑士）
        let leftHandGunEnabled = false; // 是否启用左手持枪模式

        function animate() {
            const dt = Math.min(clock.getDelta(), 0.1);

            // 天空过渡（VR/非VR 都持续更新）
            updateSkyTransition(dt);
            updateBuddhaPalmSkills(dt);     // 神掌动画（非VR也要跑）

            if (renderer.xr.isPresenting) {
                updateInputs();
                handleMovement(dt);

                updateBullets(dt);
                updateBalloons(dt);
                checkBulletBalloonCollisions();
                checkLeftHandChoiceCardCollision();
                handleExit();
                checkVRSkySwitch();
                checkBuddhaPalmTrigger();      // 必须在 updateInputs 之后
                // 调试面板每5帧更新一次
                if (!animate._frameCount) animate._frameCount = 0;
                animate._frameCount++;
                if (animate._frameCount % 5 === 0) {
                    updateDebugPanel();

                }
                vrEntryEl.style.display = 'none';
                vrHintsEl.style.display = 'none';
            } else {
                vrEntryEl.style.display = 'block';
                vrHintsEl.style.display = 'flex';
            }

            renderer.render(scene, camera);
        }
        renderer.setAnimationLoop(animate);

        // -------------------- 初始化 --------------------
        async function initScene() {
            setupController(0);
            setupController(1);

            // 进入 VR 核心函数
            async function enterVR(isLeftHandMode = false) {
                if (enterVRBtn.disabled) return;
                enterVRBtn.disabled = true;
                enterVRLeftHandBtn.disabled = true;
                enterVRBtn.textContent = '⏳ 启动中...';
                enterVRLeftHandBtn.textContent = '⏳ 启动中...';
                try {
                    if (!navigator.xr) {
                        throw new Error('浏览器不支持 WebXR');
                    }
                    
                    let session;
                    try {
                        if (navigator.xr.isSessionSupported) {
                            const supported = await navigator.xr.isSessionSupported('immersive-vr');
                            if (!supported) throw new Error('设备不支持VR');
                        }
                        session = await navigator.xr.requestSession('immersive-vr', {
                            requiredFeatures: ['local-floor']
                        });
                    } catch (e) {
                        console.log('使用 PICO 兼容模式:', e.message);
                        session = await navigator.xr.requestSession('immersive-vr');
                    }
                    
                    // 根据模式设置左手持枪状态
                    leftHandGunEnabled = isLeftHandMode;
                    console.log('🎮 左手持枪模式:', leftHandGunEnabled ? '已启用' : '未启用');
                    
                    renderer.xr.setSession(session);
                    enterVRBtn.disabled = false;
                    enterVRLeftHandBtn.disabled = false;
                    enterVRBtn.textContent = '🎈 正常开始游戏';
                    enterVRLeftHandBtn.textContent = '🔫 左手持枪模式';
                } catch (err) {
                    statusMsgEl.innerHTML = '❌ ' + err.message;
                    statusMsgEl.classList.add('error');
                    enterVRBtn.disabled = false;
                    enterVRLeftHandBtn.disabled = false;
                    enterVRBtn.textContent = '🎈 正常开始游戏';
                    enterVRLeftHandBtn.textContent = '🔫 左手持枪模式';
                }
            }

            // 正常开始游戏按钮
            enterVRBtn.onclick = () => enterVR(false);
            // 左手持枪模式按钮
            enterVRLeftHandBtn.onclick = () => enterVR(true);
            
            // 点击页面任意位置也能进入 VR（默认正常模式）
            // document.body.onclick = () => enterVR(false);
            // document.body.ontouchstart = () => enterVR(false);

            renderer.xr.addEventListener('sessionend', () => {
                setShadow(true); // 退出 VR 恢复阴影
                enterVRBtn.disabled = false;
                enterVRLeftHandBtn.disabled = false;
                vrEntryEl.style.display = 'block';
                vrHintsEl.style.display = 'flex';
                statusMsgEl.style.display = 'none';
                // 重置游戏状态（下次进入 VR 重新开始）
                gameStarted = false;
                waveNumber = 0;
                buddhaPalmReady = false;
                buddhaPalmAttached = false;
                buddhaPalmCooldown = 0;
                leftHandGunEnabled = false;
                ak48Attached = false;
                ak48LeftAttached = false;
                choiceCardsActive = false;
                if (choiceCardTimeout) { clearTimeout(choiceCardTimeout); choiceCardTimeout = null; }
                // 清除飞行中的神掌
                buddhaPalmSkills.forEach(p => {
                    p.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
                    scene.remove(p);
                });
                buddhaPalmSkills.length = 0;
                // 清除选择卡
                while (choiceCardGroup.children.length > 0) {
                    const child = choiceCardGroup.children[0];
                    if (child.material && child.material.map) child.material.map.dispose();
                    if (child.material) child.material.dispose();
                    if (child.geometry) child.geometry.dispose();
                    choiceCardGroup.remove(child);
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // 页面卸载时清理资源
            window.addEventListener('beforeunload', () => {
                renderer.dispose();
                scene.traverse(obj => {
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) {
                        if (Array.isArray(obj.material)) {
                            obj.material.forEach(m => m.dispose());
                        } else {
                            obj.material.dispose();
                        }
                    }
                });
                cloudLayers.forEach(layer => {
                    if (layer.userData.texture) layer.userData.texture.dispose();
                    if (layer.material) layer.material.dispose();
                    if (layer.geometry) layer.geometry.dispose();
                });
                dracoLoader.dispose();
            });
        }

        initScene();
    </script>
</body>
</html>
